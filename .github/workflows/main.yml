name: Build and Test

on:
  push:
    branches:
      - master
    tags: []
  pull_request:

jobs:
  ci:
    name: Build + Lint + Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24

      - name: Lint
        run: make lint

      - name: Test
        run: make test
